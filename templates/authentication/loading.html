{% extends 'layouts/base.html' %}
{% load static %}

{% block title %}Setting up... - Akaunting{% endblock %}

{% block styles %}
<link href="{% static 'css/auth.css' %}" rel="stylesheet">
<link href="{% static 'css/onboarding.css' %}" rel="stylesheet">
{% endblock %}

{% block content %}
<div id="loading-screen-trigger"></div>

<div class="split-container bg-white">
    <!-- Left Side: Illustration and Carousel -->
    <div class="split-left-hero bg-white border-end d-flex flex-column justify-content-center align-items-center" style="background: none; color: #333333;">
        <div class="text-center">
            <!-- SVG Illustration inspired by Screenshot 2 (3D layout building) -->
            <svg class="illustration-img mb-4" width="300" height="220" viewBox="0 0 300 220" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Browser Window background -->
                <rect x="30" y="70" width="240" height="130" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="3"/>
                <circle cx="45" cy="80" r="5" fill="#ef4444"/>
                <circle cx="58" cy="80" r="5" fill="#f59e0b"/>
                <circle cx="71" cy="80" r="5" fill="#10b981"/>
                <rect x="85" y="76" width="170" height="8" rx="4" fill="#e2e8f0"/>
                
                <!-- Crane / Hook Structure -->
                <path d="M120 20 L210 20 L210 50 L120 50" fill="none" stroke="#64748b" stroke-width="4"/>
                <line x1="210" y1="50" x2="210" y2="120" stroke="#b45309" stroke-width="2" stroke-dasharray="4 4"/>
                <rect x="200" y="120" width="20" height="20" rx="3" fill="#3b82f6"/>
                
                <!-- Characters (simplified) -->
                <!-- Character 1 left side pulling wire -->
                <circle cx="60" cy="140" r="10" fill="#f87171"/>
                <path d="M60 150 L60 180" stroke="#64748b" stroke-width="4"/>
                <line x1="60" y1="160" x2="110" y2="110" stroke="#b45309" stroke-width="2"/>
                
                <!-- Character 2 standing on window -->
                <circle cx="150" cy="55" r="10" fill="#60a5fa"/>
                <path d="M150 65 L150 90" stroke="#64748b" stroke-width="4"/>
            </svg>
            <h4 class="fw-bold mb-2">Get detailed reports</h4>
            
            <!-- Carousel indicators -->
            <div class="carousel-indicators position-static mt-4">
                <button type="button" class="bg-secondary opacity-25" style="width: 8px; height: 8px; border-radius: 50%; border: none; margin: 0 4px;"></button>
                <button type="button" class="active bg-secondary" style="width: 24px; height: 8px; border-radius: 4px; border: none; margin: 0 4px;"></button>
                <button type="button" class="bg-secondary opacity-25" style="width: 8px; height: 8px; border-radius: 50%; border: none; margin: 0 4px;"></button>
            </div>
        </div>
    </div>
    
    <!-- Right Side: Logo & Spinner -->
    <div class="split-right-content bg-white d-flex flex-column justify-content-center align-items-center">
        <div class="text-center">
            <!-- Logo Spinner -->
            <div class="loading-spinner-logo">
                <div class="spinner-outer"></div>
                <svg width="40" height="40" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" style="z-index: 10;">
                    <circle cx="50" cy="50" r="40" stroke="#709f54" stroke-width="12" stroke-dasharray="180 60"/>
                    <circle cx="50" cy="50" r="20" fill="#709f54"/>
                </svg>
            </div>
            
            <h4 class="fw-bold text-dark mt-4">Please wait!</h4>
            <p class="text-secondary">We're setting the company up for you.</p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{% static 'js/onboarding.js' %}"></script>
{% endblock %}
